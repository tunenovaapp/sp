name: Crawl Spotify

on:
  schedule:
    - cron: '15 */6 * * *'
  workflow_dispatch:

concurrency:
  group: crawl
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout (with committed DB)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run crawl
        run: python -u script.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Commit updated database
        if: always()
        run: |
          git config user.name "spotify-crawler-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add spotify_playwright_crawler.db
          if git diff --cached --quiet; then
            echo "No DB changes to commit."
          else
            git commit -m "crawl: update db ($(date -u +'%Y-%m-%dT%H:%MZ'))"
            git push
          fi
